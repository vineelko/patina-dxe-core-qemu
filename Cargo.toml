[package]
name = "qemu_dxe_core"
version = "2.2.14"
edition = "2024"
license = "Apache-2.0"

[[bin]]
name = "qemu_q35_dxe_core"
path = "bin/q35_dxe_core.rs"
required-features = ["x64"]

[[bin]]
name = "qemu_sbsa_dxe_core"
path = "bin/sbsa_dxe_core.rs"
required-features = ["aarch64"]

[[bin]]
name = "qemu_ovmf_dxe_core"
path = "bin/ovmf_dxe_core.rs"
required-features = ["x64"]

[lib]
name = "qemu_resources"
path = "src/lib.rs"

[dependencies]
log = { version = "^0.4", default-features = false, features = [
    "release_max_level_info",
] }
patina_adv_logger = { version = "20" }
patina_debugger = { version = "20" }
patina_dxe_core = { version = "20" }
patina_mm = { version = "20" }
patina_performance = { version = "20"}
patina_samples = { version = "20" }
patina_smbios = { version = "20"}
patina = { version = "20", features = ["enable_patina_tests"] }
patina_ffs_extractors = { version = "20" }
patina_stacktrace = { version = "20" }
r-efi = { version = "^5", default-features = false }
x86_64 = { version = "=0.15.2", default-features = false, features = [
  "instructions"
], optional = true }
zerocopy = { version = "0.8", features = ["derive"] }
qemu-exit = "3"

[features]
default = ["compatibility_mode_allowed"]
compatibility_mode_allowed = ["patina_dxe_core/compatibility_mode_allowed"]
v1_resource_descriptor_support = ["patina_dxe_core/v1_resource_descriptor_support"]
x64 = ["x86_64"]
aarch64 = []
doc = []
std = []
build_debugger = ["patina_dxe_core/debugger_reload"]
enable_debugger = ["build_debugger"]
